version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pipeline_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pipeline_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2023-05-18T00-05-36Z
    container_name: pipeline_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:2.7.1-python3.10
    container_name: pipeline_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/pipeline_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _PIP_ADDITIONAL_REQUIREMENTS=requests beautifulsoup4 pandas pyarrow boto3 sqlalchemy psycopg2-binary

    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create --username admin --firstname Admin --lastname Admin --role Admin --email admin@example.com --password admin
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/dags/src
      - ./data:/opt/airflow/data

  airflow-webserver:
    image: apache/airflow:2.7.1-python3.10
    container_name: pipeline_airflow_webserver
    command: webserver
    restart: always

    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/pipeline_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - RUNNING_IN_DOCKER=True
      - DB_CONN_STR=postgresql+psycopg2://postgres:postgres@postgres:5432/pipeline_db
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=raw-data-bucket
      - _PIP_ADDITIONAL_REQUIREMENTS=requests beautifulsoup4 pandas pyarrow boto3 sqlalchemy psycopg2-binary

    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/dags/src
      - ./data:/opt/airflow/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    image: apache/airflow:2.7.1-python3.10
    container_name: pipeline_airflow_scheduler
    command: scheduler
    restart: always

    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/pipeline_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - RUNNING_IN_DOCKER=True
      - DB_CONN_STR=postgresql+psycopg2://postgres:postgres@postgres:5432/pipeline_db
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=raw-data-bucket
      - _PIP_ADDITIONAL_REQUIREMENTS=requests beautifulsoup4 pandas pyarrow boto3 sqlalchemy psycopg2-binary

    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/dags/src
      - ./data:/opt/airflow/data

volumes:
  postgres_data:
  minio_data:
